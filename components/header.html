<!-- ============================================================
     HEADER — Express Quinuapata VRAEM S.A.C.
     ============================================================ -->
<style>
  /* ════════════════════════════════
     NAVBAR BASE
  ════════════════════════════════ */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 300;
    height: 72px;
    transition: background 0.35s ease, box-shadow 0.35s ease;
  }
  .navbar__inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* ════════════════════════════════
     ESTADOS: transparente / blanca
  ════════════════════════════════ */
  .navbar-transparente {
    background: transparent;
    box-shadow: none;
  }
  .navbar-blanca {
    background: rgba(10, 22, 40, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 2px 24px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ════════════════════════════════
     LOGO
  ════════════════════════════════ */
  .navbar__logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }
  .navbar__logo-img {
    height: 52px;
    width: auto;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }
  @media (max-width: 768px) {
    .navbar__logo-img { height: 42px; }
  }

  /* ════════════════════════════════
     LINKS DE NAVEGACIÓN
  ════════════════════════════════ */
  .navbar__links {
    display: flex;
    align-items: center;
    gap: 2px;
    list-style: none;
    margin: 0 auto;
    padding: 0;
  }
  .nav-link {
    display: inline-block;
    padding: 8px 14px;
    color: rgba(255,255,255,0.85);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    text-decoration: none;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    position: relative;
  }
  .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
  .nav-link.activo {
    color: #F59E0B !important;
    font-weight: 700;
  }
  .nav-link.activo::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 14px; right: 14px;
    height: 2px;
    background: #F59E0B;
    border-radius: 2px;
  }
  .navbar-transparente .nav-link        { color: rgba(255,255,255,0.88); }
  .navbar-transparente .nav-link:hover  { color: white; background: rgba(255,255,255,0.1); }
  .navbar-transparente .nav-link.activo { color: #F59E0B !important; }

  /* ════════════════════════════════
     DERECHA: TELÉFONO + BOTÓN CTA
  ════════════════════════════════ */
  .navbar__right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .navbar__phone {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,0.75);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .navbar__phone:hover { color: white; }
  .navbar-transparente .navbar__phone       { color: rgba(255,255,255,0.8); }
  .navbar-transparente .navbar__phone:hover { color: white; }

  .navbar__cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #F59E0B;
    color: #0F172A;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 50px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .navbar__cta:hover { background: #D97706; transform: translateY(-1px); }

  /* ════════════════════════════════
     HAMBURGUESA
  ════════════════════════════════ */
  .navbar__hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    background: none;
    border: none;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .navbar__hamburger:hover { background: rgba(0,0,0,0.06); }
  .hamburger-line {
    width: 24px; height: 2px;
    background: #0F172A;
    border-radius: 2px;
    display: block;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .navbar-transparente .hamburger-line { background: white; }
  .navbar-blanca .hamburger-line       { background: rgba(255,255,255,0.85); }
  .navbar__hamburger.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .navbar__hamburger.open .hamburger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .navbar__hamburger.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ════════════════════════════════
     MENÚ MÓVIL
  ════════════════════════════════ */
  .nav-mobile {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 12px 16px 20px;
    z-index: 999;
  }
  .nav-mobile.abierto {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: navSlideDown 0.28s ease;
  }
  @keyframes navSlideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .nav-mobile .nav-link {
    color: #0F172A !important;
    padding: 14px 16px;
    font-size: 1rem;
    border-radius: 10px;
  }
  .nav-mobile .nav-link:hover  { background: #E3F2FD; color: #1565C0 !important; }
  .nav-mobile .nav-link.activo { color: #F59E0B !important; background: #FEF3C7; }
  .nav-mobile .nav-link.activo::after { display: none; }
  .nav-mobile__sep {
    height: 1px;
    background: #E2E8F0;
    margin: 8px 0;
  }
  .nav-mobile__cta {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    background: #F59E0B; color: #0F172A;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    padding: 14px 20px; border-radius: 12px;
    text-decoration: none;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .nav-mobile__cta:hover { background: #D97706; }

  /* ════════════════════════════════
     RESPONSIVE
  ════════════════════════════════ */
  @media (max-width: 1024px) {
    .navbar__phone { display: none; }
  }
  @media (max-width: 768px) {
    .navbar__links     { display: none; }
    .navbar__cta       { display: none; }
    .navbar__hamburger { display: flex; }
    .navbar { height: 64px; }
  }
  @media (max-width: 480px) {
    .navbar { height: 60px; }
    .navbar__inner { padding: 0 16px; gap: 12px; }
    .navbar__logo-img { height: 40px; }
  }
  @media (max-width: 360px) {
    .navbar { height: 56px; }
    .navbar__inner { padding: 0 12px; gap: 8px; }
    .navbar__logo-img { height: 34px; }
    .navbar__hamburger { padding: 6px; }
  }
  /* Menú móvil: asegurar que sea legible en pantallas pequeñas */
  @media (max-width: 360px) {
    .nav-mobile .nav-link { padding: 12px 14px; font-size: 0.95rem; }
    .nav-mobile__cta { padding: 12px 16px; font-size: 0.9rem; }
  }
</style>
